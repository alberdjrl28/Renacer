<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renacer Drinks & Coffee</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#fff7fb;
      color:#222;
      text-align:center;
    }
    header{
      background:linear-gradient(135deg,#ff4f8b,#ff8fb1);
      color:white;
      padding:30px 20px;
    }
    header h1{
      margin:0;
      font-size:3rem;
    }
    header p{
      margin-top:10px;
      font-size:1.1rem;
    }
    .logo{
      width:160px;
      border-radius:20px;
      margin-bottom:15px;
      background:white;
      padding:8px;
    }
    .menu{
      max-width:900px;
      margin:30px auto;
      padding:0 15px;
    }
    .menu img{
      width:100%;
      border-radius:18px;
      box-shadow:0 8px 25px rgba(0,0,0,.12);
    }
    .btn{
      display:inline-block;
      margin:25px 10px;
      padding:14px 24px;
      background:#ff2f6d;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      font-size:1rem;
    }
    footer{
      margin-top:40px;
      padding:25px;
      background:#ffe0eb;
      color:#8a0d3b;
      font-weight:bold;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" class="logo" alt="Renacer Logo">
  <h1>Renacer</h1>
  <p>Drinks & Coffee • Sabores que mantienen tu energía</p>
</header>

<section class="menu">
  <img src="menu.jpg" alt="Menú Renacer">
</section>

<div>
  <a class="btn" href="https://instagram.com/renacer.drinks" target="_blank">
    Instagram
  </a>

  <a class="btn" href="https://wa.me/1TU_NUMERO" target="_blank">
    Pedir por WhatsApp
  </a>
</div>

<footer>
  © 2026 Renacer Drinks & Coffee
</footer>

</body>
</html>
