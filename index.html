<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renacer - Menú Digital</title>
    <style>
        :root {
            --primary-pink: #e6396e;
            --dark-pink: #b81d4c;
            --soft-pink: #ffd1dc;
            --light-bg: #fff5f7;
            --text-dark: #2d2d2d;
            --text-muted: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(rgba(255, 245, 247, 0.88), rgba(255, 255, 255, 0.92)), url('Logo.jpg') no-repeat center center fixed;
            background-size: contain;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 30px 20px 10px 20px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .equipo-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .equipo-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* Contenedor del Logo debajo de la foto del equipo */
        .header-logo-container {
            width: 90px;
            height: 90px;
            margin-bottom: 10px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(230, 57, 110, 0.15);
        }

        .header-logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header p {
            font-size: 1.1rem;
            color: var(--dark-pink);
            margin: 0;
            letter-spacing: 1px;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }

        /* --- Ventana Flotante de Momentos (Modal) --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 10px;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--dark-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .grid-momentos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .grid-momentos img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- Contenedor Principal del Menú --- */
        .menu-container {
            width: 92%;
            max-width: 550px;
            margin-top: 15px;
            margin-bottom: 160px; /* Más espacio para que no tape las dos barras fijas */
        }

        .categoria-card {
            background: rgba(255, 255, 255, 0.94);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 25px 22px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(230, 57, 110, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.2s ease;
        }

        .categoria-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 10px;
        }

        .categoria-titulo {
            color: var(--dark-pink);
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            margin: 0;
        }

        .decoracion-icono {
            color: var(--primary-pink);
            font-size: 1.2rem;
        }

        .producto-item {
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .producto-item:last-child {
            margin-bottom: 0;
        }

        .producto-fila {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
        }

        .producto-nombre {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .producto-puntos {
            flex-grow: 1;
            border-bottom: 1px dotted var(--soft-pink);
            position: relative;
            top: -4px;
        }

        .producto-precio {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--dark-pink);
            white-space: nowrap;
        }

        .producto-descripcion {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-top: 5px;
            line-height: 1.4;
            max-width: 90%;
        }

        .info-banner {
            background: linear-gradient(135deg, var(--primary-pink), var(--dark-pink));
            color: white;
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(230, 57, 110, 0.2);
            font-size: 0.95rem;
            font-weight: 500;
        }
        .info-banner strong {
            font-size: 1.1rem;
            color: #fff;
        }

        /* --- NUEVO: Sistema de Barras Flotantes Inferiores Duplicadas --- */
        .action-bar-container {
            position: fixed;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 92%;
            max-width: 520px;
            z-index: 100;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 18px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(230, 57, 110, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn-instagram {
            background: #e6396e;
        }

        .btn-momentos {
            background: #b81d4c;
        }

        .btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .equipo-container { max-width: 100%; }
            .producto-nombre, .producto-precio { font-size: 1.05rem; }
            header p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <!-- Imagen del Equipo de Trabajo arriba -->
        <div class="equipo-container">
            <img src="Equipo de trabajo .jpg" alt="Nuestro Equipo de Trabajo">
        </div>
        
        <!-- NUEVO: Tu logo principal integrado abajo de la foto -->
        <div class="header-logo-container">
            <img src="Logo.jpg" alt="Renacer Logo">
        </div>
        
        <!-- Eslogan corporativo -->
        <p>sabores que mantienen tu energía</p>
    </header>

    <!-- Ventana Emergente Oculta de Momentos -->
    <div id="modal-momentos" class="modal" onclick="closeModalOnBackdrop(event, 'modal-momentos')">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nuestros Momentos</h3>
                <button class="close-btn" onclick="closeModal('modal-momentos')">&times;</button>
            </div>
            <div class="grid-momentos">
                <img src="Momentos 1.jpg" alt="Momento 1">
                <img src="Momentos 2.jpg" alt="Momento 2">
                <img src="Momentos 3.jpg" alt="Momento 3">
                <img src="Momentos 4.jpg" alt="Momento 4">
                <img src="Momentos 5.jpg" alt="Momento 5">
            </div>
        </div>
    </div>

    <div class="menu-container">
        <div class="info-banner">
            ✨ Puedes añadir <strong>35g extra de proteína</strong> por solo <strong>$0.50</strong> ✨
        </div>

        <div id="dinamic-menu">
            <p style="text-align:center; color: var(--dark-pink); font-weight:500;">Cargando exquisito menú...</p>
        </div>
    </div>

    <!-- Contenedor con las Dos Barras de Acciones Fijas Inferiores -->
    <div class="action-bar-container">
        <!-- Botón Flotante para abrir la ventana de Momentos -->
        <button class="btn btn-momentos" onclick="openModal('modal-momentos')">
            ✨ Ver Nuestros Momentos
        </button>
        
        <!-- Botón Flotante para ir a Instagram -->
        <a href="https://instagram.com/renacer.drinks" target="_blank" class="btn btn-instagram">
            📸 Síguenos en Instagram
        </a>
    </div>

    <script>
        // Funciones para abrir y cerrar la ventana flotante de Momentos
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        function closeModalOnBackdrop(event, id) {
            if (event.target === document.getElementById(id)) {
                closeModal(id);
            }
        }

        // Script de carga dinámica del menú
        fetch('menu.json')
            .then(response => response.json())
            .then(data => {
                const menuDiv = document.getElementById('dinamic-menu');
                menuDiv.innerHTML = '';
                
                data.categorias.forEach(cat => {
                    let cardHTML = `
                        <div class="categoria-card">
                            <div class="categoria-header">
                                <span class="decoracion-icono">🌿</span>
                                <h2 class="categoria-titulo">${cat.nombre}</h2>
                            </div>
                    `;
                    
                    cat.productos.forEach(prod => {
                        cardHTML += `
                            <div class="producto-item">
                                <div class="producto-fila">
                                    <span class="producto-nombre">${prod.nombre}</span>
                                    <div class="producto-puntos"></div>
                                    <span class="producto-precio">$${parseFloat(prod.precio).toFixed(2)}</span>
                                </div>
                                ${prod.descripcion ? `<div class="producto-descripcion">${prod.descripcion}</div>` : ''}
                            </div>
                        `;
                    });
                    
                    cardHTML += `</div>`;
                    menuDiv.innerHTML += cardHTML;
                });
            })
            .catch(error => {
                document.getElementById('dinamic-menu').innerHTML = 
                    `<div class="categoria-card" style="text-align:center; color:red;">
                        <h3>¡Ups! Hubo un problema al cargar los precios.</h3>
                        <p>Por favor, verifica que tu archivo en GitHub se llame 'menu.json' en minúsculas.</p>
                     </div>`;
                console.error('Error:', error);
            });
    </script>
</body>
</html>
